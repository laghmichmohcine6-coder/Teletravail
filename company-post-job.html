<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Post a Job - Télétravail">
    <title>Post a Job - Télétravail</title>

    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/page-transitions.css">
    <link rel="stylesheet" href="assets/css/premium-enhancements.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="loading-screen">
        <div class="loading-logo">
            <div class="logo-icon">T</div>
        </div>
    </div>

    <div class="dashboard-wrapper page-transition">
        <aside class="dashboard-sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">T</div>
                <span class="sidebar-logo-text">Télétravail</span>
            </div>

            <nav>
                <ul class="sidebar-menu">
                    <li class="sidebar-menu-item">
                        <a href="company-dashboard.html" class="sidebar-menu-link">
                            <span class="sidebar-menu-icon"><i class="fas fa-th-large"></i></span>
                            <span data-i18n="nav_overview">Overview</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="company-post-job.html" class="sidebar-menu-link active">
                            <span class="sidebar-menu-icon"><i class="fas fa-plus-circle"></i></span>
                            <span data-i18n="nav_post_job">Post Job</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="company-jobs.html" class="sidebar-menu-link">
                            <span class="sidebar-menu-icon"><i class="fas fa-briefcase"></i></span>
                            <span data-i18n="nav_manage_jobs">Manage Jobs</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="company-profile.html" class="sidebar-menu-link">
                            <span class="sidebar-menu-icon"><i class="fas fa-building"></i></span>
                            <span data-i18n="nav_company_profile">Company Profile</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="#" class="sidebar-menu-link" onclick="Auth.logout()">
                            <span class="sidebar-menu-icon"><i class="fas fa-sign-out-alt"></i></span>
                            <span data-i18n="nav_logout">Logout</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-user">
                <img src="https://ui-avatars.com/api/?name=Company&background=D4AF37&color=0B0B0B&size=128"
                    alt="Company Avatar" class="sidebar-user-avatar" id="sidebarAvatar">
                <div class="sidebar-user-info">
                    <h4 id="sidebarName">Company Name</h4>
                    <p id="sidebarEmail">company@email.com</p>
                </div>
            </div>
        </aside> 

        <main class="dashboard-main">
            <div class="dashboard-topbar">
                <div class="topbar-left">
                    <button class="menu-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="topbar-welcome">
                        <h2 data-i18n="post_job_title">Post a Job</h2>
                        <p data-i18n="post_job_subtitle">Find the perfect candidate for your team</p>
                    </div>
                </div>

                <div class="topbar-right">
                    <!-- Language Selector -->
                    <div class="language-selector" style="display: flex; gap: 5px; margin-right: 15px;">
                        <button class="lang-btn active" data-lang="en"
                            style="background: none; border: 1px solid var(--border-color); color: var(--muted-text); cursor: pointer; padding: 2px 5px; font-size: 0.8rem;">EN</button>
                        <button class="lang-btn" data-lang="fr"
                            style="background: none; border: 1px solid var(--border-color); color: var(--muted-text); cursor: pointer; padding: 2px 5px; font-size: 0.8rem;">FR</button>
                    </div>
                </div>
            </div>

            <div class="dashboard-content">
                <div class="card reveal" style="max-width: 800px; margin: 0 auto;">
                    <form id="postJobForm">
                        <div class="form-group">
                            <label for="title" data-i18n="form_job_title">Job Title *</label>
                            <input type="text" id="title" name="title" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="type" data-i18n="form_job_type">Job Type *</label>
                                <select id="type" name="type" required>
                                    <option value="Full-time" data-i18n="type_full_time">Full-time</option>
                                    <option value="Part-time" data-i18n="type_part_time">Part-time</option>
                                    <option value="Contract" data-i18n="type_contract">Contract</option>
                                    <option value="Freelance" data-i18n="type_freelance">Freelance</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="location" data-i18n="form_location">Location *</label>
                                <select id="location" name="location" required>
                                    <option value="Remote" data-i18n="loc_remote">Remote</option>
                                    <option value="Hybrid" data-i18n="loc_hybrid">Hybrid</option>
                                    <option value="On-site" data-i18n="loc_onsite">On-site</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="salary" data-i18n="form_salary">Salary Range</label>
                            <input type="text" id="salary" name="salary" placeholder="e.g., $80k - $120k">
                        </div>

                        <div class="form-group">
                            <label for="description" data-i18n="form_job_desc">Job Description *</label>
                            <textarea id="description" name="description" rows="6" required></textarea>
                        </div>

                        <div class="form-group">
                            <label for="requirements" data-i18n="form_requirements">Requirements *</label>
                            <textarea id="requirements" name="requirements" rows="6" required></textarea>
                        </div>

                        <div class="form-group">
                            <label for="benefits" data-i18n="form_benefits">Benefits (Optional)</label>
                            <textarea id="benefits" name="benefits" rows="4"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="status" data-i18n="form_status">Status *</label>
                            <select id="status" name="status" required>
                                <option value="active" data-i18n="status_active">Active</option>
                                <option value="draft" data-i18n="status_draft">Draft</option>
                            </select>
                        </div>

                        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                            <a href="company-jobs.html" class="btn btn-ghost" data-i18n="btn_cancel">Cancel</a>
                            <button type="submit" class="btn btn-primary" data-i18n="btn_post_job">Post Job</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/auth.js"></script>
    <script src="assets/js/core/roles.js"></script>
    <script src="assets/js/core/guards.js"></script>
    <script src="assets/js/core/i18n.js"></script>
    <script src="assets/js/shared/ui.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/animations.js"></script>
    <script src="assets/js/animations-premium.js"></script>
    <script src="assets/js/page-transition-manager.js"></script>
    <script>
        Guards.requireCompany();

        // Populate Company Info
        const company = Auth.getCurrentUser();
        if (company) {
            const companyNameEl = document.querySelector('#sidebarName');
            const companyEmailEl = document.querySelector('#sidebarEmail');
            const companyAvatarEl = document.querySelector('#sidebarAvatar');

            if (companyNameEl) companyNameEl.textContent = company.companyName;
            if (companyEmailEl) companyEmailEl.textContent = company.email;
            if (companyAvatarEl) {
                companyAvatarEl.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(company.companyName)}&background=D4AF37&color=0B0B0B&size=128`;
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const editJobId = urlParams.get('id');

        if (editJobId) {
            const job = Storage.getJobById(editJobId);
            if (job && Roles.canEditJob(editJobId)) {
                document.getElementById('title').value = job.title || '';
                document.getElementById('type').value = job.type || 'Full-time';
                document.getElementById('location').value = job.location || 'Remote';
                document.getElementById('salary').value = job.salary || '';
                document.getElementById('description').value = job.description || '';
                document.getElementById('requirements').value = job.requirements || '';
                document.getElementById('benefits').value = job.benefits || '';
                document.getElementById('status').value = job.status || 'active';

                document.querySelector('.topbar-welcome h2').textContent = 'Edit Job'; // i18n should probably handle this dynamically if possible, but for now specific overrides
                document.querySelector('.topbar-welcome h2').setAttribute('data-i18n', 'edit_job_title'); // Assuming we add this key
                document.querySelector('button[type="submit"]').textContent = 'Update Job';
                document.querySelector('button[type="submit"]').setAttribute('data-i18n', 'btn_update_job');
            } else {
                UI.showToast('You do not have permission to edit this job', 'error');
                window.location.href = 'company-jobs.html';
            }
        }

        document.getElementById('postJobForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const company = Auth.getCurrentUser();
            const jobData = {
                title: document.getElementById('title').value,
                type: document.getElementById('type').value,
                location: document.getElementById('location').value,
                salary: document.getElementById('salary').value,
                description: document.getElementById('description').value,
                requirements: document.getElementById('requirements').value,
                benefits: document.getElementById('benefits').value,
                status: document.getElementById('status').value,
                companyId: company.id
            };

            if (editJobId) {
                if (Storage.updateJob(editJobId, jobData)) {
                    UI.showToast('Job updated successfully', 'success');
                    setTimeout(() => {
                        window.location.href = 'company-jobs.html';
                    }, 1500);
                } else {
                    UI.showToast('Failed to update job', 'error');
                }
            } else {
                if (Storage.saveJob(jobData)) {
                    UI.showToast('Job posted successfully', 'success');
                    setTimeout(() => {
                        window.location.href = 'company-jobs.html';
                    }, 1500);
                } else {
                    UI.showToast('Failed to post job', 'error');
                }
            }
        });

        // Language Selector
        const langButtons = document.querySelectorAll('.lang-btn');
        langButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const lang = e.target.getAttribute('data-lang');
                if (window.i18n) {
                    window.i18n.setLanguage(lang);
                    langButtons.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                }
            });
        });
    </script>
</body>

</html>
