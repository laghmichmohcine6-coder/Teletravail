<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Company Profile - Télétravail">
    <title>Company Profile - Télétravail</title>

    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/page-transitions.css">
    <link rel="stylesheet" href="assets/css/premium-enhancements.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="loading-screen">
        <div class="loading-logo">
            <div class="logo-icon">T</div>
        </div>
    </div>

    <div class="dashboard-wrapper page-transition">
        <aside class="dashboard-sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">T</div>
                <span class="sidebar-logo-text">Télétravail</span>
            </div>

            <nav>
                <ul class="sidebar-menu">
                    <li class="sidebar-menu-item">
                        <a href="company-dashboard.html" class="sidebar-menu-link">
                            <span class="sidebar-menu-icon"><i class="fas fa-th-large"></i></span>
                            <span data-i18n="nav_overview">Overview</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="company-post-job.html" class="sidebar-menu-link">
                            <span class="sidebar-menu-icon"><i class="fas fa-plus-circle"></i></span>
                            <span data-i18n="nav_post_job">Post Job</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="company-jobs.html" class="sidebar-menu-link">
                            <span class="sidebar-menu-icon"><i class="fas fa-briefcase"></i></span>
                            <span data-i18n="nav_manage_jobs">Manage Jobs</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="company-profile.html" class="sidebar-menu-link active">
                            <span class="sidebar-menu-icon"><i class="fas fa-building"></i></span>
                            <span data-i18n="nav_company_profile">Company Profile</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="#" class="sidebar-menu-link" onclick="Auth.logout()">
                            <span class="sidebar-menu-icon"><i class="fas fa-sign-out-alt"></i></span>
                            <span data-i18n="nav_logout">Logout</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-user">
                <img src="https://ui-avatars.com/api/?name=Company&background=D4AF37&color=0B0B0B&size=128"
                    alt="Company Avatar" class="sidebar-user-avatar" id="sidebarAvatar">
                <div class="sidebar-user-info">
                    <h4 id="sidebarName">Company Name</h4>
                    <p id="sidebarEmail">company@email.com</p>
                </div>
            </div>
        </aside>

        <main class="dashboard-main">
            <div class="dashboard-topbar">
                <div class="topbar-left">
                    <button class="menu-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="topbar-welcome">
                        <h2 data-i18n="company_profile_title">Company Profile</h2>
                        <p data-i18n="company_profile_subtitle">Manage your company information</p>
                    </div>
                </div>

                <div class="topbar-right">
                    <!-- Language Selector -->
                    <div class="language-selector" style="display: flex; gap: 5px; margin-right: 15px;">
                        <button class="lang-btn active" data-lang="en"
                            style="background: none; border: 1px solid var(--border-color); color: var(--muted-text); cursor: pointer; padding: 2px 5px; font-size: 0.8rem;">EN</button>
                        <button class="lang-btn" data-lang="fr"
                            style="background: none; border: 1px solid var(--border-color); color: var(--muted-text); cursor: pointer; padding: 2px 5px; font-size: 0.8rem;">FR</button>
                    </div>
                </div>
            </div>

            <div class="dashboard-content">
                <div class="card" style="max-width: 800px; margin: 0 auto;">
                    <form id="companyProfileForm">
                        <div class="form-group">
                            <label for="companyName" data-i18n="form_company_name">Company Name *</label>
                            <input type="text" id="companyName" name="companyName" required>
                        </div>

                        <div class="form-group">
                            <label for="email" data-i18n="form_company_email">Company Email *</label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <div class="form-group">
                            <label for="website" data-i18n="form_website">Website</label>
                            <input type="url" id="website" name="website">
                        </div>

                        <div class="form-group">
                            <label for="description" data-i18n="form_description">Company Description</label>
                            <textarea id="description" name="description" rows="6"></textarea>
                        </div>

                        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                            <button type="submit" class="btn btn-primary" data-i18n="btn_update_profile">Update
                                Profile</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/auth.js"></script>
    <script src="assets/js/core/roles.js"></script>
    <script src="assets/js/core/guards.js"></script>
    <script src="assets/js/core/i18n.js"></script>
    <script src="assets/js/shared/ui.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/animations.js"></script>
    <script src="assets/js/animations-premium.js"></script>
    <script src="assets/js/page-transition-manager.js"></script>
    <script>
        Guards.requireCompany();

        const company = Auth.getCurrentUser();
        if (company) {
            document.getElementById('companyName').value = company.companyName || '';
            document.getElementById('email').value = company.email || '';
            document.getElementById('website').value = company.website || '';
            document.getElementById('description').value = company.description || '';

            const companyNameEl = document.querySelector('#sidebarName');
            const companyEmailEl = document.querySelector('#sidebarEmail');
            const companyAvatarEl = document.querySelector('#sidebarAvatar');

            if (companyNameEl) companyNameEl.textContent = company.companyName;
            if (companyEmailEl) companyEmailEl.textContent = company.email;
            if (companyAvatarEl) {
                companyAvatarEl.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(company.companyName)}&background=D4AF37&color=0B0B0B&size=128`;
            }
        }

        document.getElementById('companyProfileForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const updates = {
                companyName: document.getElementById('companyName').value,
                email: document.getElementById('email').value,
                website: document.getElementById('website').value,
                description: document.getElementById('description').value
            };

            if (Storage.updateCompany(company.id, updates)) {
                Storage.setCurrentUser({ ...company, ...updates });
                UI.showToast('Profile updated successfully', 'success');
                setTimeout(() => {
                    location.reload();
                }, 1500);
            } else {
                UI.showToast('Failed to update profile', 'error');
            }
        });

        // Language Selector
        const langButtons = document.querySelectorAll('.lang-btn');
        langButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const lang = e.target.getAttribute('data-lang');
                if (window.i18n) {
                    window.i18n.setLanguage(lang);
                    langButtons.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                }
            });
        });
    </script>
</body>

</html>
