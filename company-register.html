<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Registration - Télétravail</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/auth-premium.css">
</head>

<body>
    <div class="auth-page">
        <div class="particles" id="particles"></div>
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="auth-container">
            <div class="auth-card">
                <a href="index.html" class="auth-logo">
                    <div class="auth-logo-icon">T</div>
                    <span class="auth-logo-text">Télétravail</span>
                </a>
                <div class="auth-header">
                    <div class="company-badge"><i class="fas fa-building"></i> <span data-i18n="company_reg">Company
                            Registration</span></div>
                    <h2 data-i18n="company_join_title">Start Hiring Top Talent</h2>
                    <p data-i18n="company_join_subtitle">Join the premier remote work marketplace</p>
                </div>
                <form id="companyRegisterForm">
                    <div class="logo-upload">
                        <label for="logoInput" class="logo-preview" id="logoPreviewContainer">
                            <img id="logoPreview" style="display: none;" alt="Logo Preview">
                            <i class="fas fa-building logo-placeholder" id="logoPlaceholder"></i>
                        </label>
                        <input type="file" id="logoInput" accept="image/*" onchange="previewLogo(this)">
                        <div class="logo-upload-text" data-i18n="upload_logo">Click to upload company logo (optional)
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="companyName" class="form-label" data-i18n="form_company_name">Company Name *</label>
                        <input type="text" id="companyName" class="form-input" placeholder="Your Company Inc." required>
                    </div>
                    <div class="form-group">
                        <label for="email" class="form-label" data-i18n="form_company_email">Company Email *</label>
                        <input type="email" id="email" class="form-input" placeholder="contact@company.com" required>
                    </div>
                    <div class="form-group">
                        <label for="website" class="form-label" data-i18n="form_website">Website</label>
                        <input type="url" id="website" class="form-input" placeholder="https://yourcompany.com">
                    </div>
                    <div class="form-group">
                        <label for="password" class="form-label" data-i18n="form_password">Password *</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" class="form-input"
                                placeholder="Create a strong password" required>
                            <button type="button" class="password-toggle" onclick="togglePassword()">
                                <i class="fas fa-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="description" class="form-label" data-i18n="form_description">Company
                            Description</label>
                        <textarea id="description" class="form-textarea"
                            placeholder="Tell us about your company..."></textarea>
                    </div>
                    <div class="form-checkbox">
                        <input type="checkbox" id="terms" required>
                        <label for="terms" data-i18n="agree_terms">I agree to the Terms of Service and Privacy
                            Policy</label>
                    </div>
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-rocket"></i> <span data-i18n="btn_create_account">Create Company Account</span>
                    </button>
                </form>
                <div class="auth-footer">
                    <p><span data-i18n="already_account">Already have an account?</span> <a href="company-login.html"
                            data-i18n="nav_login">Sign in</a></p>
                    <p><span data-i18n="looking_for_job">Looking for a job?</span> <a href="register.html"
                            data-i18n="nav_join">Register as a user</a></p>
                    <p><a href="index.html" data-i18n="nav_home">← Back to Home</a></p>
                </div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMessage"></span></div>
    <div class="success-overlay" id="successOverlay">
        <div class="success-content">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <div class="success-text">Welcome Aboard!</div>
            <div class="success-subtext">Setting up your company dashboard...</div>
        </div>
    </div>
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/auth.js"></script>
    <script src="assets/js/core/guards.js"></script>
    <script src="assets/js/core/i18n.js"></script>
    <script src="assets/js/auth-premium.js"></script>
    <script>
        Guards.redirectIfAuthenticated();
        document.getElementById('companyRegisterForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const companyData = {
                companyName: document.getElementById('companyName').value,
                email: document.getElementById('email').value,
                website: document.getElementById('website').value,
                password: document.getElementById('password').value,
                description: document.getElementById('description').value
            };
            const result = Auth.registerCompany(companyData);
            if (result.success) {
                document.getElementById('successOverlay').classList.add('show');
                setTimeout(() => {
                    Auth.loginCompany(companyData.email, companyData.password);
                    window.location.href = 'company-dashboard.html';
                }, 1500);
            } else {
                showToast(result.message);
            }
        });
    </script>
</body>

</html>
