<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Télétravail — Elite Remote Work</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <style>
        /* ============================================================
           RESET & BASE
        ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* ============================================================
           CSS VARIABLES — matches main.css design system
        ============================================================ */
        :root {
            --gold-main: #C6A64B;
            --gold-dark: #A67C00;
            --gold-highlight: #E6C76A;
            --gold-muted: #BFA14A;
            --gold-gradient: linear-gradient(135deg, #BFA14A, #E6C76A, #A67C00);
            --font-display: 'Playfair Display', serif;
            --font-primary: 'Inter', -apple-system, sans-serif;
        }

        /* ============================================================
           SPLASH WRAPPER
        ============================================================ */
        #splash {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 50% 40%, #111 0%, #0A0A0A 55%, #000 100%);
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.9s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #splash.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* ============================================================
           BACKGROUND — LIGHT STREAKS (SVG canvas approach via CSS)
        ============================================================ */
        .streaks-canvas {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .streak {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(198, 166, 75, 0.0) 15%,
                    rgba(198, 166, 75, 0.55) 50%,
                    rgba(230, 199, 106, 0.7) 60%,
                    rgba(198, 166, 75, 0.0) 100%);
            transform-origin: center center;
            opacity: 0;
            animation: streakReveal 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        /* Individual streak positions — mirror the diagonal lines from the image */
        .streak:nth-child(1) {
            width: 160%;
            top: 22%;
            left: -30%;
            transform: rotate(-18deg);
            animation-delay: 1.1s;
        }

        .streak:nth-child(2) {
            width: 150%;
            top: 38%;
            left: -20%;
            transform: rotate(12deg);
            animation-delay: 1.25s;
        }

        .streak:nth-child(3) {
            width: 140%;
            top: 54%;
            left: -10%;
            transform: rotate(-9deg);
            animation-delay: 1.4s;
        }

        .streak:nth-child(4) {
            width: 170%;
            top: 68%;
            left: -40%;
            transform: rotate(22deg);
            animation-delay: 1.55s;
        }

        .streak:nth-child(5) {
            width: 130%;
            top: 80%;
            left: -15%;
            transform: rotate(-6deg);
            animation-delay: 1.7s;
        }

        @keyframes streakReveal {
            0% {
                opacity: 0;
                filter: blur(1px);
                transform: rotate(var(--r, 0deg)) scaleX(0.3);
            }

            40% {
                opacity: 1;
            }

            100% {
                opacity: 0.45;
                filter: blur(0px);
                transform: rotate(var(--r, 0deg)) scaleX(1);
            }
        }

        /* Subtle ambient glow orb behind logo */
        .ambient-orb {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 420px;
            height: 420px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(198, 166, 75, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            animation: orbFade 1s ease 0.4s forwards;
            pointer-events: none;
        }

        @keyframes orbFade {
            to {
                opacity: 1;
            }
        }

        /* ============================================================
           LOGO MARK
        ============================================================ */
        .splash-logo-wrap {
            position: relative;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: logoReveal 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
        }

        @keyframes logoReveal {
            0% {
                opacity: 0;
                transform: scale(0.65) rotate(-4deg);
            }

            60% {
                opacity: 1;
                transform: scale(1.04) rotate(0.5deg);
            }

            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        .splash-logo {
            width: 100px;
            height: 100px;
            background: var(--gold-gradient);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 700;
            color: #0A0A0A;
            position: relative;
            z-index: 2;
            animation: logoPulse 2.2s ease-in-out 1.0s infinite alternate;
        }

        @keyframes logoPulse {
            0% {
                box-shadow: 0 0 20px rgba(198, 166, 75, 0.4), 0 0 50px rgba(198, 166, 75, 0.15);
            }

            100% {
                box-shadow: 0 0 40px rgba(230, 199, 106, 0.7), 0 0 90px rgba(198, 166, 75, 0.3), 0 0 130px rgba(166, 124, 0, 0.12);
            }
        }

        /* Halo ring behind logo */
        .logo-halo {
            position: absolute;
            inset: -12px;
            background: var(--gold-gradient);
            border-radius: 30px;
            z-index: 1;
            opacity: 0.35;
            filter: blur(16px);
            animation: haloPulse 2.2s ease-in-out 1.0s infinite alternate;
        }

        @keyframes haloPulse {
            0% {
                opacity: 0.25;
                filter: blur(14px);
                transform: scale(1);
            }

            100% {
                opacity: 0.5;
                filter: blur(22px);
                transform: scale(1.08);
            }
        }

        /* ============================================================
           BRAND NAME
        ============================================================ */
        .splash-brand {
            font-family: var(--font-display);
            font-size: clamp(2.4rem, 6vw, 4rem);
            font-weight: 700;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, #fff 0%, #E6C76A 45%, #C6A64B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transform: translateY(18px);
            animation: textRise 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.95s forwards;
            text-align: center;
            line-height: 1.1;
        }

        /* Accent diacritic (é) sits naturally via font */

        @keyframes textRise {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
           DIVIDER LINE
        ============================================================ */
        .splash-divider {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-main), transparent);
            margin: 1.4rem auto;
            opacity: 0;
            animation: lineExpand 0.7s cubic-bezier(0.22, 1, 0.36, 1) 1.55s forwards;
        }

        @keyframes lineExpand {
            to {
                width: 220px;
                opacity: 0.7;
            }
        }

        /* ============================================================
           TAGLINE
        ============================================================ */
        .splash-tagline {
            font-family: var(--font-primary);
            font-size: clamp(0.85rem, 2vw, 1.05rem);
            font-weight: 300;
            color: rgba(198, 166, 75, 0.75);
            letter-spacing: 0.22em;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(10px);
            animation: textRise 0.7s cubic-bezier(0.22, 1, 0.36, 1) 1.75s forwards;
            text-align: center;
        }

        /* ============================================================
           LOADING INDICATOR (bottom)
        ============================================================ */
        .splash-loader {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            opacity: 0;
            animation: textRise 0.6s ease 2.2s forwards;
        }

        .loader-track {
            width: 140px;
            height: 1px;
            background: rgba(198, 166, 75, 0.15);
            border-radius: 1px;
            overflow: hidden;
            position: relative;
        }

        .loader-fill {
            height: 100%;
            width: 0%;
            background: var(--gold-gradient);
            border-radius: 1px;
            animation: loaderFill 1.5s cubic-bezier(0.4, 0, 0.2, 1) 2.3s forwards;
        }

        @keyframes loaderFill {
            to {
                width: 100%;
            }
        }

        .loader-text {
            font-family: var(--font-primary);
            font-size: 0.7rem;
            font-weight: 400;
            color: rgba(198, 166, 75, 0.5);
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        /* ============================================================
           CORNER ACCENTS (decorative)
        ============================================================ */
        .corner {
            position: absolute;
            width: 32px;
            height: 32px;
            opacity: 0;
            animation: cornerFade 0.5s ease 1.3s forwards;
        }

        .corner::before,
        .corner::after {
            content: '';
            position: absolute;
            background: var(--gold-main);
            opacity: 0.55;
        }

        /* horizontal bar */
        .corner::before {
            width: 100%;
            height: 1px;
            top: 0;
            left: 0;
        }

        /* vertical bar */
        .corner::after {
            width: 1px;
            height: 100%;
            top: 0;
            left: 0;
        }

        .corner-tl {
            top: 6%;
            left: 5%;
        }

        .corner-tr {
            top: 6%;
            right: 5%;
            transform: scaleX(-1);
        }

        .corner-bl {
            bottom: 6%;
            left: 5%;
            transform: scaleY(-1);
        }

        .corner-br {
            bottom: 6%;
            right: 5%;
            transform: scale(-1);
        }

        @keyframes cornerFade {
            to {
                opacity: 1;
            }
        }

        /* ============================================================
           RESPONSIVE
        ============================================================ */
        @media (max-width: 480px) {
            .splash-logo {
                width: 80px;
                height: 80px;
                font-size: 2.3rem;
                border-radius: 18px;
            }

            .corner {
                width: 22px;
                height: 22px;
            }

            .splash-loader {
                bottom: 8%;
            }
        }

        /* ============================================================
           REDUCED MOTION
        ============================================================ */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>

    <div id="splash">

        <!-- Corner accent marks -->
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <!-- Background light streaks -->
        <div class="streaks-canvas" aria-hidden="true">
            <div class="streak"></div>
            <div class="streak"></div>
            <div class="streak"></div>
            <div class="streak"></div>
            <div class="streak"></div>
        </div>

        <!-- Ambient glow behind logo -->
        <div class="ambient-orb" aria-hidden="true"></div>

        <!-- Logo mark -->
        <div class="splash-logo-wrap" role="img" aria-label="Télétravail logo">
            <div class="logo-halo" aria-hidden="true"></div>
            <div class="splash-logo">T</div>
        </div>

        <!-- Brand name -->
        <h1 class="splash-brand">Télétravail</h1>

        <!-- Gold divider -->
        <div class="splash-divider" aria-hidden="true"></div>

        <!-- Tagline -->
        <p class="splash-tagline">Elite Remote Opportunities</p>

        <!-- Loading bar -->
        <div class="splash-loader" aria-hidden="true">
            <div class="loader-track">
                <div class="loader-fill"></div>
            </div>
            <span class="loader-text">Loading</span>
        </div>

    </div>

    <script>
        (function () {
            'use strict';

            var splash = document.getElementById('splash');

            // Total visible duration before fade-out begins
            // Sequence: logo(0.3s) → brand(0.95s) → divider(1.55s) → tagline(1.75s) → loader(2.3s–3.8s)
            // Fade-out starts at 3.9s, redirect at 4.8s
            var FADE_OUT_DELAY = 3900;  // ms
            var REDIRECT_DELAY = 4800;  // ms
            var REDIRECT_TARGET = 'index.html';

            // Respect reduced-motion preference — skip straight to redirect
            var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            if (prefersReduced) {
                setTimeout(function () { window.location.href = REDIRECT_TARGET; }, 600);
                return;
            }

            // Schedule fade-out
            setTimeout(function () {
                splash.classList.add('fade-out');
            }, FADE_OUT_DELAY);

            // Schedule redirect after fade completes
            setTimeout(function () {
                window.location.href = REDIRECT_TARGET;
            }, REDIRECT_DELAY);

            // Safety net — if something goes wrong, still redirect
            window.addEventListener('error', function () {
                setTimeout(function () {
                    window.location.href = REDIRECT_TARGET;
                }, 1000);
            }, { once: true });

            // Allow users to skip by clicking or pressing any key
            function skip() {
                splash.style.transition = 'opacity 0.4s ease';
                splash.classList.add('fade-out');
                setTimeout(function () {
                    window.location.href = REDIRECT_TARGET;
                }, 420);
            }

            document.addEventListener('keydown', function (e) {
                if (e.key !== 'Tab') skip();   // Tab kept for accessibility
            }, { once: true });

            document.addEventListener('click', skip, { once: true });
        })();
    </script>

</body>

</html>
