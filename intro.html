<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teletravail</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050505;
        }

        /* ─── Scene ──────────────────────────────────────────── */
        #intro-scene {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
            z-index: 9999;
            will-change: opacity;
        }

        /* ─── Vignette ───────────────────────────────────────── */
        #intro-scene::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 68% 68% at 50% 50%,
                    transparent 15%,
                    rgba(5, 5, 5, 0.88) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* ─── Central radial golden glow ─────────────────────── */
        #intro-glow {
            position: absolute;
            width: min(560px, 88vw);
            height: min(560px, 88vw);
            border-radius: 50%;
            background: radial-gradient(circle,
                    rgba(212, 175, 55, 0.13) 0%,
                    rgba(200, 150, 20, 0.06) 40%,
                    transparent 70%);
            pointer-events: none;
            z-index: 2;
        }

        /* ─── Shake wrapper ──────────────────────────────────── */
        #intro-wrap {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.28em;
            will-change: transform;
        }

        /* ─── "T" ────────────────────────────────────────────── */
        #intro-logo {
            display: block;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: clamp(100px, 17vw, 180px);
            font-weight: 400;
            letter-spacing: 0.04em;
            line-height: 1;
            user-select: none;

            background: linear-gradient(152deg,
                    #f5e6a3 0%,
                    #dbb94a 26%,
                    #d4af37 50%,
                    #e8cf6c 74%,
                    #f5e8b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

            filter:
                drop-shadow(0 0 12px rgba(212, 175, 55, 0.52)) drop-shadow(0 0 36px rgba(200, 148, 18, 0.24));

            transform: translateY(-200vh);
            will-change: transform, filter;
        }

        /* ─── Wordmark ───────────────────────────────────────── */
        #intro-wordmark {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: clamp(10px, 1.4vw, 14px);
            font-weight: 400;
            letter-spacing: 0.40em;
            text-transform: uppercase;

            background: linear-gradient(90deg, #c9a84c, #e8cc70, #c9a84c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

            opacity: 0;
            will-change: opacity;
        }

        /* ═══════════════════════════════════════════════════════
       KEYFRAMES
    ═══════════════════════════════════════════════════════ */

        /* 1 — cinematic fall + micro bounce */
        @keyframes logoFall {
            0% {
                transform: translateY(-200vh);
                filter: blur(5px) drop-shadow(0 0 0 transparent);
            }

            55% {
                filter: blur(3px) drop-shadow(0 0 8px rgba(212, 175, 55, 0.20));
            }

            80% {
                transform: translateY(7px);
                filter: blur(0px) drop-shadow(0 0 14px rgba(212, 175, 55, 0.48));
            }

            89% {
                transform: translateY(-4px);
            }

            94% {
                transform: translateY(2px);
            }

            100% {
                transform: translateY(0);
                filter:
                    drop-shadow(0 0 12px rgba(212, 175, 55, 0.52)) drop-shadow(0 0 36px rgba(200, 148, 18, 0.24));
            }
        }

        /* 2 — wordmark appears after logo lands */
        @keyframes wordmarkIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 0.80;
            }
        }

        /* 3 — glow pulse */
        @keyframes glowPulse {
            0% {
                filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.52)) drop-shadow(0 0 36px rgba(200, 148, 18, 0.24));
            }

            40% {
                filter: drop-shadow(0 0 32px rgba(212, 175, 55, 0.85)) drop-shadow(0 0 72px rgba(200, 148, 18, 0.45));
            }

            100% {
                filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.52)) drop-shadow(0 0 36px rgba(200, 148, 18, 0.24));
            }
        }

        /* 4 — camera shake max 2px */
        @keyframes shake {
            0% {
                transform: translate(0, 0);
            }

            15% {
                transform: translate(-2px, 1px);
            }

            30% {
                transform: translate(2px, -1px);
            }

            50% {
                transform: translate(-1px, 2px);
            }

            68% {
                transform: translate(2px, 0);
            }

            84% {
                transform: translate(-1px, -1px);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        /* 5 — full scene fade out */
        @keyframes sceneFadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div id="intro-scene">
        <div id="intro-glow"></div>

        <div id="intro-wrap">
            <span id="intro-logo">T</span>
            <span id="intro-wordmark">Teletravail</span>
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            var scene = document.getElementById('intro-scene');
            var logo = document.getElementById('intro-logo');
            var wordmark = document.getElementById('intro-wordmark');
            var wrap = document.getElementById('intro-wrap');

            /*
              TIMING — target ~2.0s wall-clock:
      
                60ms  fall begins
                800ms fall duration  → lands at ~860ms
                land effects at 80% of fall = 60 + 640 = ~700ms
                  shake   320ms
                  pulse   420ms
                  wordmark fades in 280ms
                hold    500ms  → from ~1120ms
                fadeout 420ms  → starts ~1620ms
                redirect       → ~2040ms  ✓
            */
            var FALL_START = 60;
            var FALL_DUR = 800;
            var LAND_AT = FALL_START + Math.round(FALL_DUR * 0.80); // ~700ms
            var SHAKE_DUR = 320;
            var PULSE_DUR = 420;
            var WORD_DUR = 280;
            var HOLD = 500;
            var FADE_DUR = 420;

            var peakAt = LAND_AT + Math.max(SHAKE_DUR, PULSE_DUR);
            var fadeAt = peakAt + HOLD;
            var endAt = fadeAt + FADE_DUR;

            /* 1 — logo falls */
            setTimeout(function () {
                logo.style.animation =
                    'logoFall ' + FALL_DUR + 'ms cubic-bezier(0.22,1,0.36,1) forwards';
            }, FALL_START);

            /* 2 — landing: shake + pulse + wordmark */
            setTimeout(function () {
                wrap.style.animation =
                    'shake ' + SHAKE_DUR + 'ms ease-out forwards';

                logo.style.animation =
                    'logoFall ' + FALL_DUR + 'ms cubic-bezier(0.22,1,0.36,1) forwards, ' +
                    'glowPulse ' + PULSE_DUR + 'ms ease-in-out forwards';

                wordmark.style.animation =
                    'wordmarkIn ' + WORD_DUR + 'ms ease forwards';
            }, LAND_AT);

            /* 3 — fade out */
            setTimeout(function () {
                scene.style.animation =
                    'sceneFadeOut ' + FADE_DUR + 'ms ease forwards';
            }, fadeAt);

            /* 4 — redirect */
            setTimeout(function () {
                window.location.href = 'index.html';
            }, endAt);

        })();
    </script>

</body>

</html>
