<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Remote Job Opportunities - Télétravail Dashboard">
    <title>Remote Jobs - Dashboard - Télétravail</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/page-transitions.css">
    <link rel="stylesheet" href="assets/css/premium-enhancements.css">
    <link rel="stylesheet" href="assets/css/responsive.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ── Filter Bar ─────────────────────────────────────── */
        .dash-jobs-filters {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
            align-items: center;
        }

        .dash-filter-select {
            padding: 0.75rem 1rem;
            background: var(--secondary-dark);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-light);
            font-size: 0.9rem;
            cursor: pointer;
            min-width: 160px;
            transition: none !important;
        }

        .dash-filter-select:focus {
            outline: none;
            border-color: var(--gold-accent);
        }

        .dash-filter-select:hover {
            border-color: rgba(198, 166, 75, 0.6);
        }

        /* ── Jobs Grid ──────────────────────────────────────── */
        .dash-jobs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: var(--spacing-lg);
        }

        /* ── Job Card ───────────────────────────────────────── */
        .dash-job-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            cursor: pointer;
            transition: none !important;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            position: relative;
            overflow: hidden;
        }

        .dash-job-card:hover {
            border-color: var(--gold-accent);
            box-shadow: 0 8px 30px rgba(198, 166, 75, 0.18);
            transform: none !important;
        }

        .dash-job-card-header {
            display: flex;
            align-items: flex-start;
            gap: var(--spacing-md);
        }

        .dash-job-logo {
            width: 56px;
            height: 56px;
            background: var(--gold-gradient);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary-bg);
            flex-shrink: 0;
        }

        .dash-job-info h3 {
            color: var(--text-light);
            font-size: 1.05rem;
            margin: 0 0 0.2rem;
        }

        .dash-job-info p {
            color: var(--muted-text);
            font-size: 0.875rem;
            margin: 0;
        }

        .dash-job-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .dash-badge {
            padding: 0.3rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.78rem;
            font-weight: 500;
        }

        .dash-badge-location {
            background: rgba(198, 166, 75, 0.12);
            color: var(--gold-accent);
            border: 1px solid rgba(198, 166, 75, 0.3);
        }

        .dash-badge-type {
            background: rgba(255, 255, 255, 0.06);
            color: var(--muted-text);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dash-badge-category {
            background: rgba(33, 150, 243, 0.1);
            color: #90caf9;
            border: 1px solid rgba(33, 150, 243, 0.2);
        }

        .dash-job-desc {
            color: var(--muted-text);
            font-size: 0.9rem;
            line-height: 1.6;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .dash-job-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: var(--spacing-md);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .dash-job-salary {
            color: var(--gold-accent);
            font-weight: 700;
            font-size: 0.95rem;
        }

        /* ── Apply Button — Fixed Size (LOCKED: never resizes) ── */
        .dash-apply-btn {
            height: 48px !important;
            min-height: 48px !important;
            max-height: 48px !important;
            padding: 0 1.25rem !important;
            font-size: 0.875rem !important;
            box-sizing: border-box !important;
            white-space: nowrap;
            display: inline-flex !important;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex: 0 0 auto !important;
            /* ── TRANSFORM KILL SWITCH — no scale, no translateY ── */
            transform: none !important;
            /* ── Transition: visual-only, no dimensions ─────────── */
            transition: none !important;
            box-shadow: 0 2px 10px rgba(198, 166, 75, 0.3) !important;
        }

        .dash-apply-btn:hover {
            height: 48px !important;
            transform: none !important;
            box-shadow: 0 4px 18px rgba(198, 166, 75, 0.5) !important;
            filter: brightness(1.08);
        }

        .dash-apply-btn:active {
            height: 48px !important;
            transform: none !important;
            box-shadow: 0 1px 8px rgba(198, 166, 75, 0.3) !important;
            filter: brightness(0.95);
        }

        .dash-apply-btn:focus,
        .dash-apply-btn:focus-visible {
            height: 48px !important;
            transform: none !important;
            outline: 2px solid var(--gold-accent);
            outline-offset: 2px;
        }

        /* ── Jobs Count Label ───────────────────────────────── */
        .dash-jobs-count {
            margin-left: auto;
            color: var(--muted-text);
            font-size: 0.9rem;
        }

        .dash-jobs-count strong {
            color: var(--gold-accent);
            font-size: 1rem;
        }

        /* ── Empty State ────────────────────────────────────── */
        .dash-jobs-empty {
            text-align: center;
            padding: var(--spacing-xxl);
            color: var(--muted-text);
            grid-column: 1 / -1;
        }

        .dash-jobs-empty i {
            font-size: 3rem;
            color: var(--gold-accent);
            margin-bottom: var(--spacing-md);
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <!-- Loading Screen -->
    <div class="loading-screen">
        <div class="loading-logo">
            <div class="logo-icon">T</div>
        </div>
    </div>

    <div class="dashboard-wrapper page-transition">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">T</div>
                <span class="sidebar-logo-text">Télétravail</span>
            </div>

            <nav>
                <ul class="sidebar-menu">
                    <li class="sidebar-menu-item">
                        <a href="dashboard.html" class="sidebar-menu-link">
                            <span class="sidebar-menu-icon"><i class="fas fa-th-large"></i></span>
                            <span data-i18n="nav_overview">Overview</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="dashboard-applications.html" class="sidebar-menu-link">
                            <span class="sidebar-menu-icon"><i class="fas fa-file-alt"></i></span>
                            <span data-i18n="nav_applications">My Applications</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="dashboard-jobs.html" class="sidebar-menu-link active">
                            <span class="sidebar-menu-icon"><i class="fas fa-briefcase"></i></span>
                            <span data-i18n="nav_remote_jobs">Remote Jobs</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="profile.html" class="sidebar-menu-link">
                            <span class="sidebar-menu-icon"><i class="fas fa-user"></i></span>
                            <span data-i18n="nav_profile">Profile</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="#" class="sidebar-menu-link" onclick="if(window.Auth) Auth.logout(); return false;">
                            <span class="sidebar-menu-icon"><i class="fas fa-sign-out-alt"></i></span>
                            <span data-i18n="nav_logout">Logout</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-user">
                <img src="https://ui-avatars.com/api/?name=User&background=D4AF37&color=0B0B0B&size=128"
                    alt="User Avatar" class="sidebar-user-avatar" id="sidebarAvatar">
                <div class="sidebar-user-info">
                    <h4 id="sidebarName">User</h4>
                    <p id="sidebarEmail">user@example.com</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Top Bar -->
            <div class="dashboard-topbar">
                <div class="topbar-left">
                    <button class="menu-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="topbar-welcome">
                        <h2 data-i18n="dash_jobs_title">Remote Job Opportunities</h2>
                        <p data-i18n="dash_jobs_subtitle">Discover your next career move from our curated selection</p>
                    </div>
                </div>

                <div class="topbar-right">
                    <!-- Language Selector -->
                    <div class="language-selector" style="display: flex; gap: 5px; margin-right: 15px;">
                        <button class="lang-btn" data-lang="en"
                            style="background: none; border: 1px solid var(--border-color); color: var(--muted-text); cursor: pointer; padding: 2px 8px; font-size: 0.8rem; border-radius: 4px;">EN</button>
                        <button class="lang-btn" data-lang="fr"
                            style="background: none; border: 1px solid var(--border-color); color: var(--muted-text); cursor: pointer; padding: 2px 8px; font-size: 0.8rem; border-radius: 4px;">FR</button>
                    </div>

                    <div class="topbar-search">
                        <i class="fas fa-search topbar-search-icon"></i>
                        <input type="text" id="jobSearchInput" data-i18n-placeholder="search_jobs_placeholder"
                            placeholder="Search jobs, companies...">
                    </div>
                    <div class="topbar-notifications">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge">3</span>
                    </div>
                </div>
            </div>

            <!-- Dashboard Content -->
            <div class="dashboard-content">

                <!-- Filter Bar -->
                <div class="dash-jobs-filters">
                    <select class="dash-filter-select" id="dashCategoryFilter">
                        <option value="" data-i18n="filter_all_categories">All Categories</option>
                        <option value="development" data-i18n="cat_development">Development</option>
                        <option value="design" data-i18n="cat_design">Design</option>
                        <option value="marketing" data-i18n="cat_marketing">Marketing</option>
                        <option value="management" data-i18n="cat_management">Management</option>
                        <option value="sales" data-i18n="cat_sales">Sales</option>
                        <option value="support" data-i18n="cat_support">Support</option>
                    </select>

                    <select class="dash-filter-select" id="dashTypeFilter">
                        <option value="" data-i18n="filter_all_types">All Types</option>
                        <option value="Full-time" data-i18n="filter_type_fulltime">Full-time</option>
                        <option value="Part-time" data-i18n="filter_type_parttime">Part-time</option>
                        <option value="Contract" data-i18n="filter_type_contract">Contract</option>
                        <option value="Freelance" data-i18n="filter_type_freelance">Freelance</option>
                    </select>

                    <div class="dash-jobs-count">
                        <strong id="dashJobCount">0</strong>&nbsp;<span data-i18n="jobs_found">jobs found</span>
                    </div>
                </div>

                <!-- Jobs Grid -->
                <div class="dash-jobs-grid" id="dashJobsGrid">
                    <!-- Populated by JavaScript -->
                </div>

            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/auth.js"></script>
    <script src="assets/js/core/roles.js"></script>
    <script src="assets/js/core/guards.js"></script>
    <script src="assets/js/core/i18n.js"></script>
    <script src="assets/js/shared/ui.js"></script>
    <script src="assets/js/data/jobs.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/animations.js"></script>
    <script src="assets/js/animations-premium.js"></script>
    <script src="assets/js/page-transition-manager.js"></script>

    <script>
        // ── Dashboard Jobs Page Logic ────────────────────────────────────────
        (function () {
            'use strict';

            // ── Helpers ──────────────────────────────────────────────────────
            function escapeHtml(text) {
                const d = document.createElement('div');
                d.textContent = text || '';
                return d.innerHTML;
            }

            function t(key) {
                return (window.i18n && window.i18n.t) ? window.i18n.t(key) : key;
            }

            // ── Card Renderer ─────────────────────────────────────────────────
            function createJobCard(job) {
                const card = document.createElement('div');
                card.className = 'dash-job-card';
                card.setAttribute('data-job-id', job.id);

                const applyText = t('apply_now');

                card.innerHTML = `
                    <div class="dash-job-card-header">
                        <div class="dash-job-logo">${escapeHtml(job.companyLogo || job.company.charAt(0))}</div>
                        <div class="dash-job-info">
                            <h3>${escapeHtml(job.title)}</h3>
                            <p>${escapeHtml(job.company)}</p>
                        </div>
                    </div>
                    <div class="dash-job-badges">
                        <span class="dash-badge dash-badge-location">
                            <i class="fas fa-map-marker-alt" style="margin-right:4px;font-size:0.75rem;"></i>${escapeHtml(job.location)}
                        </span>
                        <span class="dash-badge dash-badge-type">
                            <i class="fas fa-clock" style="margin-right:4px;font-size:0.75rem;"></i>${escapeHtml(job.type)}
                        </span>
                        <span class="dash-badge dash-badge-category">
                            <i class="fas fa-tag" style="margin-right:4px;font-size:0.75rem;"></i>${escapeHtml(job.category)}
                        </span>
                    </div>
                    <p class="dash-job-desc">${escapeHtml(job.description)}</p>
                    <div class="dash-job-footer">
                        <span class="dash-job-salary">${escapeHtml(job.salary)}</span>
                        <button class="btn btn-primary dash-apply-btn" data-apply-btn>
                            ${applyText} <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                `;

                // Navigate to job details on card click
                card.addEventListener('click', function (e) {
                    if (!e.target.closest('[data-apply-btn]')) {
                        window.location.href = 'job-details.html?id=' + job.id;
                    }
                });

                // Apply button opens job details
                const applyBtn = card.querySelector('[data-apply-btn]');
                if (applyBtn) {
                    applyBtn.addEventListener('click', function (e) {
                        e.stopPropagation();
                        window.location.href = 'job-details.html?id=' + job.id;
                    });
                }

                return card;
            }

            // ── Render Jobs ───────────────────────────────────────────────────
            function renderJobs() {
                const grid = document.getElementById('dashJobsGrid');
                const countEl = document.getElementById('dashJobCount');
                const categoryVal = document.getElementById('dashCategoryFilter').value;
                const typeVal = document.getElementById('dashTypeFilter').value;
                const searchVal = (document.getElementById('jobSearchInput').value || '').toLowerCase().trim();

                if (!grid) return;

                // Guard: JobsData must be available
                if (!window.JobsData) {
                    grid.innerHTML = `<div class="dash-jobs-empty"><i class="fas fa-exclamation-circle"></i><p>${t('job_unavailable')}</p></div>`;
                    return;
                }

                let jobs = window.JobsData.getAll();

                // Filter by category
                if (categoryVal) {
                    jobs = jobs.filter(j => j.category === categoryVal);
                }

                // Filter by type
                if (typeVal) {
                    jobs = jobs.filter(j => j.type === typeVal);
                }

                // Filter by search
                if (searchVal) {
                    jobs = jobs.filter(j =>
                        (j.title || '').toLowerCase().includes(searchVal) ||
                        (j.company || '').toLowerCase().includes(searchVal) ||
                        (j.description || '').toLowerCase().includes(searchVal)
                    );
                }

                // Update count
                if (countEl) countEl.textContent = jobs.length;

                // Clear grid
                grid.innerHTML = '';

                if (jobs.length === 0) {
                    const noJobsMsg = t('no_jobs_found');
                    const adjustMsg = t('adjust_filters');
                    grid.innerHTML = `<div class="dash-jobs-empty">
                        <i class="fas fa-search"></i>
                        <p style="font-size:1.1rem; color: var(--text-light); margin-bottom:0.5rem;">${noJobsMsg}</p>
                        <p>${adjustMsg}</p>
                    </div>`;
                    return;
                }

                jobs.forEach(job => {
                    grid.appendChild(createJobCard(job));
                });
            }

            // ── Re-render Apply Now text on language change ───────────────────
            document.addEventListener('languageChanged', function () {
                const applyText = t('apply_now');
                document.querySelectorAll('#dashJobsGrid [data-apply-btn]').forEach(btn => {
                    const icon = btn.querySelector('i');
                    btn.textContent = applyText + ' ';
                    if (icon) btn.appendChild(icon);
                });
                // Also update count label (static data-i18n handles the "jobs found" span already)
            });

            // ── Init ──────────────────────────────────────────────────────────
            document.addEventListener('DOMContentLoaded', function () {
                // Auth guard — redirect to login if not authenticated
                if (window.Guards && Guards.redirectIfUnauthenticated) {
                    Guards.redirectIfUnauthenticated();
                }

                // Populate sidebar user info
                if (window.Auth && Auth.getCurrentUser) {
                    const user = Auth.getCurrentUser();
                    if (user) {
                        const avatarUrl = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.name) + '&background=D4AF37&color=0B0B0B';
                        const nameEl = document.getElementById('sidebarName');
                        const emailEl = document.getElementById('sidebarEmail');
                        const avatarEl = document.getElementById('sidebarAvatar');
                        if (nameEl) nameEl.textContent = user.name;
                        if (emailEl) emailEl.textContent = user.email;
                        if (avatarEl) avatarEl.src = avatarUrl;
                    }
                }

                // Initial render
                renderJobs();

                // Wire up filters
                document.getElementById('dashCategoryFilter').addEventListener('change', renderJobs);
                document.getElementById('dashTypeFilter').addEventListener('change', renderJobs);

                // Search input (debounced)
                let searchTimer;
                document.getElementById('jobSearchInput').addEventListener('input', function () {
                    clearTimeout(searchTimer);
                    searchTimer = setTimeout(renderJobs, 250);
                });

                // Mobile menu toggle
                const menuToggle = document.querySelector('.menu-toggle');
                const sidebar = document.querySelector('.dashboard-sidebar');
                if (menuToggle && sidebar) {
                    menuToggle.addEventListener('click', function () {
                        sidebar.classList.toggle('open');
                    });
                }
            });
        })();
    </script>
</body>

</html>
